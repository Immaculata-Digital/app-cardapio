name: Deploy Production - App Cardápio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: app-cardapio-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker build \
            --build-arg VITE_API_BASE_URL='${{ secrets.VITE_API_BASE_URL_MAIN }}' \
            -t ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:latest .
          docker push ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:latest

  deploy:
    needs: build-and-deploy
    runs-on: self-hosted
    env:
      IMAGE_NAME: app-cardapio-production

    steps:
      - name: Pull and run container
        run: |
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          docker pull ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:latest
          docker stop ${IMAGE_NAME} || true
          docker rm ${IMAGE_NAME} || true
          docker run -d \
            --name ${IMAGE_NAME} \
            --restart unless-stopped \
            --network concordia-network \
            -p 3177:80 \
            ghcr.io/${REPO_OWNER_LOWER}/${IMAGE_NAME}:latest

      - name: Cleanup old images
        run: |
          docker image prune -f || true
